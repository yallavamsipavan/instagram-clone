spring.application.name=instagram

server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/instagram_clone
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

jwt.secret=8f42a7c9e3b1d6f04a8c7e2b9d1f6a3c8e5b2d9f7a1c4e6b3d8f2a9c5e7b1d4f
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=604800000

spring.data.redis.host=localhost
spring.data.redis.port=6379

storage.endpoint=http://localhost:9000
storage.bucket=instagram-clone-media
storage.access-key=minioadmin
storage.secret-key=minioadmin
storage.location=uploads
storage.base-url=http://localhost:8080/media

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB